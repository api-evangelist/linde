description: Linde plc is an industrial gases and engineering company. APIs that exist (customer self-service,
  cylinder tracking, telemetry, EDI / e-commerce integrations) are exposed to existing customers and
  partners rather than as a public, self-serve developer product. There is no public plans/pricing page
  for an "API surface".
notes: No public API pricing page found. Plan below is a placeholder for customer / partner engagement;
  pricing for Linde products and any associated digital integrations is negotiated under the master
  supply / engineering agreement.
sources:
  - https://www.linde.com
plans:
  - id: linde-customer
    name: Customer / Partner Integration
    type: enterprise
    description: Digital integrations (telemetry, cylinder tracking, e-commerce, ordering) provided to
      existing Linde customers and partners. There is no metered API price; integration costs are bundled
      into the customer / supply agreement.
    entries:
      - label: Customer Integration Access
        name: api_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact provider
        userMultiplied: false
    elements:
      - name: Customer / Partner Onboarding
      - name: EDI / e-Commerce Integration
      - name: Cylinder Telemetry / Tracking
      - name: Linde API
