specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Linde
providerId: linde
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Industrial Gases
  - Engineering
  - Chemistry
description: 'FOCUS-aligned FinOps scaffold for Linde: customer / partner-only digital integrations with
  no public per-call API pricing. Consumer-side telemetry tracks against the underlying supply / engineering
  agreement rather than metered API invoices.'
notes: Pricing is bundled into customer agreements. Meters describe the consumer-side observation surface.
sources:
  - https://www.linde.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Linde plc
serviceCategory: Industrial Gases / API
billingModel:
  pricingCategory: Bundled with Supply Agreement
  billingFrequency: Per-Invoice
  billingCurrency: USD/EUR/GBP
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Linde API
  ServiceCategory: Industrial Gases / API
  ProviderName: Linde
  PublisherName: Linde plc
  InvoiceIssuerName: Linde plc
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - integration
      - environment
      - customer
  - name: telemetry_events
    unit: event
    aggregation: sum
    dimensions:
      - asset
      - site
  - name: edi_messages
    unit: message
    aggregation: sum
    dimensions:
      - partner
      - document_type
principles:
  - name: Visibility
    description: Track API and EDI message volumes through your own integration platform / observability
      stack; Linde does not expose a public usage API.
  - name: Allocation
    description: Tag integrations by site, customer cost center, and gas / engineering product line so
      digital touchpoints can be associated with the right supply contract.
  - name: Optimization
    description: Batch order and replenishment messages to agreed EDI cadences; sample telemetry rather
      than streaming where supply contracts allow.
  - name: Accountability
    description: Assign a Linde customer / digital integration owner per contract who reconciles digital
      integration cost-of-ownership against supply spend.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
