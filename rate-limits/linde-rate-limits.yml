specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Linde
providerId: linde
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Industrial Gases
  - Engineering
  - Chemistry
description: Linde does not publish public API rate-limit documentation. Customer / partner integrations
  are governed by the underlying customer agreement and Linde's gateway / EDI throttling configuration;
  numeric ceilings are not exposed publicly.
notes: No public rate-limit documentation found.
sources:
  - https://www.linde.com
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Customer / Partner API Limit
    scope: api-key
    metric: varies
    limit: see customer agreement
    notes: Numeric ceilings are not published; refer to your Linde customer / EDI agreement.
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter and honor Retry-After when
      returned.
  - name: Telemetry Cadence
    description: Cylinder / asset telemetry is typically batched at agreed cadences; sustained higher-frequency
      polling requires coordination with the Linde digital integration team.
maintainers:
